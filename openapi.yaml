openapi: 3.0.3
info:
  title: ContractGuard Test API
  version: 1.0.0
  description: Baseline OpenAPI spec for testing ContractGuard PR checks.
servers:
  - url: https://api.example.com
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
  /contracts/{contractId}:
    get:
      summary: Fetch a contract by ID
      operationId: getContractById
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
    patch:
      summary: Update contract metadata
      operationId: patchContractById
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractRequest"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
components:
  schemas:
    Contract:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
        revision:
          type: integer
      required:
        - id
        - title
    UpdateContractRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
