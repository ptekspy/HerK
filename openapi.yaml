openapi: 3.0.3
info:
  title: ContractGuard Test API
  version: 1.0.0
  description: Baseline OpenAPI spec for testing ContractGuard PR checks.
servers:
  - url: https://api.example.com
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
components:
  schemas:
    Contract:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
        revision:
          type: integer
      required:
        - id
        - title
    UpdateContractRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
