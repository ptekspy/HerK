openapi: 3.0.3
info:
  title: API Contract Guard Test API
  version: 1.0.0
  description: Baseline OpenAPI spec for testing API Contract Guard PR checks.
servers:
  - url: https://api.example.com
paths:
components:
  schemas:
    Contract:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
        revision:
          type: integer
      required:
        - id
        - title
    UpdateContractRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - archived
