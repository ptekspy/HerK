name: contractguard

services:
  api:
    build:
      context: .
      dockerfile: apps/contract-guard/api/Dockerfile
    container_name: contractguard-api
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - '127.0.0.1:4001:4001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - contractguard_net

  worker:
    build:
      context: .
      dockerfile: apps/contract-guard/worker/Dockerfile
    container_name: contractguard-worker
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - contractguard_net

  web:
    build:
      context: .
      dockerfile: apps/contract-guard/web/Dockerfile
    container_name: contractguard-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.compose
    environment:
      PORT: 4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://paddy.systems}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-https://paddy.systems}
    ports:
      - '127.0.0.1:4000:4000'
    networks:
      - contractguard_net

networks:
  contractguard_net:
    external: true
