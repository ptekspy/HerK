name: contractguard

services:
  api:
    build:
      context: .
      dockerfile: apps/contract-guard/api/Dockerfile
    container_name: contractguard-api
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      PORT: 4001
    ports:
      - '127.0.0.1:4001:4001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - contractguard_net

  worker:
    build:
      context: .
      dockerfile: apps/contract-guard/worker/Dockerfile
    container_name: contractguard-worker
    restart: unless-stopped
    env_file:
      - .env.compose
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - contractguard_net

  web:
    build:
      context: .
      dockerfile: apps/contract-guard/web/Dockerfile
    container_name: contractguard-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.compose
    environment:
      PORT: 4000
    ports:
      - '127.0.0.1:4000:4000'
    networks:
      - contractguard_net

networks:
  contractguard_net:
    external: true
