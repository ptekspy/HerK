version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contractguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    command: ["postgres", "-c", "password_encryption=scram-sha-256"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: contractguard-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - '127.0.0.1:${PGADMIN_PORT:-5050}:80'

  redis:
    image: redis:7-alpine
    container_name: contractguard-redis
    restart: unless-stopped
    command: ['sh', '-c', 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "${REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10

  redisinsight:
    image: redis/redisinsight:latest
    container_name: contractguard-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight_data:/data
    ports:
      - '127.0.0.1:${REDISINSIGHT_PORT:-5540}:5540'

  caddy:
    image: caddy:2-alpine
    container_name: contractguard-infra-caddy
    restart: unless-stopped
    depends_on:
      pgadmin:
        condition: service_started
      redisinsight:
        condition: service_started
    environment:
      INFRA_ADMIN_USER: ${INFRA_ADMIN_USER}
      INFRA_ADMIN_PASS_HASH: ${INFRA_ADMIN_PASS_HASH}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/caddy/Caddyfile.infra:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redisinsight_data:
  caddy_data:
  caddy_config:
